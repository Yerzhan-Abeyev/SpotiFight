<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotiFight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(29,185,84,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(29,185,84,0.025) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        .card { background: linear-gradient(145deg,#181818,#111); border: 1px solid rgba(255,255,255,0.06); }

        #word-display {
            font-family: 'Bebas Neue', sans-serif; font-size: 4.5rem;
            letter-spacing: 0.12em; line-height: 1;
            background: linear-gradient(135deg,#1DB954,#17a349);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        #timer-bar { height: 100%; border-radius: 999px; background: linear-gradient(90deg,#1DB954,#17a349); }

        .search-input {
            background: #1a1a1a; border: 1.5px solid rgba(255,255,255,0.08); color: #fff;
            border-radius: 12px; padding: 14px 18px; width: 100%; font-size: 0.95rem;
            outline: none; transition: border-color 0.2s; font-family: 'Inter', sans-serif;
        }
        .search-input:focus { border-color: #1DB954; }
        .search-input::placeholder { color: #444; }

        .results-window { max-height: 290px; overflow-y: auto; background: #111; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .results-window::-webkit-scrollbar { width: 5px; }
        .results-window::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }

        .song-item { display: flex; align-items: center; gap: 14px; padding: 11px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
        .song-item:last-child { border-bottom: none; }
        .song-item:hover { background: #1c1c1c; }
        .song-item img { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .song-placeholder { width: 46px; height: 46px; border-radius: 6px; background: #222; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .song-title { font-weight: 600; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 0.75rem; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Checking box */
        #checking-box {
            width: 100%; padding: 14px 16px; border-radius: 14px;
            background: #111; border: 1.5px solid #222;
            display: none; align-items: center; gap: 12px;
        }
        #checking-box img { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .ck-info { flex: 1; min-width: 0; }
        .ck-title { font-weight: 600; font-size: 0.85rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ck-status { font-size: 0.73rem; color: #555; margin-top: 3px; }
        .ck-status span { animation: bounce 0.9s infinite ease-in-out; display: inline-block; }
        .ck-status span:nth-child(2) { animation-delay: .15s; }
        .ck-status span:nth-child(3) { animation-delay: .3s; }

        /* Feedback */
        .feedback-box { width: 100%; padding: 18px 20px; border-radius: 14px; font-size: 1rem; font-weight: 600; text-align: center; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes popIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        .fb-win  { background: #0c2418; border: 1.5px solid #1DB954; color: #1DB954; }
        .fb-lose { background: #2b0d0d; border: 1.5px solid #ff4444; color: #ff5555; }
        .fb-warn { background: #1e1a0a; border: 1.5px solid #f59e0b; color: #f59e0b; }

        #start-btn {
            background: #1DB954; color: #000; font-weight: 700; font-size: 0.95rem;
            padding: 14px 44px; border-radius: 999px; border: none; cursor: pointer;
            letter-spacing: 0.04em; transition: transform 0.15s, box-shadow 0.2s; font-family: 'Inter', sans-serif;
        }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 28px rgba(29,185,84,0.35); }

        .dot-loader { display: flex; gap: 6px; justify-content: center; padding: 22px; }
        .dot-loader span { width: 7px; height: 7px; background: #1DB954; border-radius: 50%; animation: bounce 1s infinite ease-in-out; }
        .dot-loader span:nth-child(2) { animation-delay: .15s; }
        .dot-loader span:nth-child(3) { animation-delay: .3s; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

        .empty-state { padding: 28px; text-align: center; color: #444; font-size: 0.82rem; }
        .back-link { font-size: 0.72rem; color: #333; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: color 0.15s; }
        .back-link:hover { color: #666; }
        .stat-label { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; font-size: 0.8rem; color: #444; }
        .stat-val   { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.06em; font-size: 1.15rem; }
        .note { font-size: 0.72rem; color: #2a2a2a; text-align: center; }
        .stat-divider { width: 1px; background: #222; height: 28px; }

        /* Difficulty badges */
        .diff-badge { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; font-size: 0.8rem; padding: 2px 10px; border-radius: 999px; }
        .diff-easy   { background: #0c2418; color: #1DB954; border: 1px solid #1DB954; }
        .diff-medium { background: #1e1208; color: #f59e0b; border: 1px solid #f59e0b; }
        .diff-hard   { background: #2b0d0d; color: #ff5555; border: 1px solid #ff5555; }

        /* Word container difficulty tint on hard */
        #word-display.hard {
            background: linear-gradient(135deg,#ff5555,#cc2222);
            -webkit-background-clip: text; background-clip: text;
        }
        #word-display.medium {
            background: linear-gradient(135deg,#f59e0b,#d97706);
            -webkit-background-clip: text; background-clip: text;
        }

        /* Game over */
        .go-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.8rem; color: #ff4444; letter-spacing: 0.12em; line-height: 1; }
        .go-score { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; letter-spacing: 0.08em; color: #fff; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-5">

<div class="w-full max-w-xl flex items-center justify-between pt-4 pb-2 relative z-10">
    <a href="home.html" class="back-link">&#8592; Modes</a>
    <div style="text-align:right;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.1em;color:#1DB954;line-height:1;">SpotiFight</div>
        <div style="font-size:0.62rem;color:#2a2a2a;letter-spacing:0.2em;text-transform:uppercase;">Global Songs</div>
    </div>
</div>

<!-- Stats bar (shown during game) -->
<div id="score-area" class="w-full max-w-xl mb-3 px-1 relative z-10" style="display:none;">
    <div style="display:flex;justify-content:center;align-items:center;gap:20px;">
        <div style="text-align:center;">
            <div class="stat-label">Score</div>
            <div class="stat-val" id="score-val">0</div>
        </div>
        <div class="stat-divider"></div>
        <div style="text-align:center;">
            <div class="stat-label">Streak</div>
            <div class="stat-val" id="streak-val">0</div>
        </div>
        <div class="stat-divider"></div>
        <div style="text-align:center;">
            <div class="stat-label">Level</div>
            <div style="margin-top:3px;"><span id="diff-badge" class="diff-badge diff-easy">EASY</span></div>
        </div>
    </div>
</div>

<div class="card w-full max-w-xl rounded-2xl p-7 shadow-2xl relative z-10">
<div class="flex flex-col items-center gap-5">

    <div id="word-container" class="text-center" style="display:none;">
        <p style="color:#444;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px;">Must be in lyrics &mdash; must NOT be in title</p>
        <div id="word-display"></div>
    </div>

    <div id="timer-container" class="w-full" style="display:none;">
        <div style="background:#1a1a1a;height:5px;border-radius:999px;overflow:hidden;">
            <div id="timer-bar" style="width:100%;height:100%;"></div>
        </div>
        <p id="timer-text" style="color:#444;font-size:0.72rem;text-align:right;margin-top:5px;font-variant-numeric:tabular-nums;">30s</p>
    </div>

    <button id="start-btn" onclick="startGame()">&#9654; Start Game</button>

    <div id="search-container" class="w-full" style="display:none;flex-direction:column;gap:10px;">
        <input id="search-bar" class="search-input" type="text" placeholder="Type a song name…" autocomplete="off" oninput="onSearchInput(this.value)">
        <div id="results-window" class="results-window">
            <div id="empty-state" class="empty-state">🎵 Start typing to search songs…</div>
            <div id="loader-area" style="display:none;"><div class="dot-loader"><span></span><span></span><span></span></div></div>
            <ul id="songs-list"></ul>
        </div>
    </div>

    <div id="checking-box">
        <img id="ck-art" src="" alt="">
        <div class="ck-info">
            <div class="ck-title" id="ck-title"></div>
            <div class="ck-status" id="ck-status">Checking lyrics<span>.</span><span>.</span><span>.</span></div>
        </div>
    </div>

    <div id="feedback" style="display:none;width:100%;"></div>

    <div id="game-over-box" style="display:none;width:100%;text-align:center;"></div>

</div>
</div>

<p class="note" style="margin-top:18px;">Powered by Spotify &amp; lyrics.ovh</p>

<script>
// ── WORD BANKS ────────────────────────────────────────────────────────────────
// Easy (80): words that appear in an enormous number of songs — easy to find a match
const WORDS_EASY = [
    'love',    'heart',   'baby',    'night',   'feel',    'life',    'time',    'know',
    'need',    'come',    'back',    'say',     'want',    'stay',    'fall',    'give',
    'take',    'make',    'never',   'always',  'forever', 'dream',   'fire',    'rain',
    'light',   'dark',    'day',    'mind',    'home',    'run',     'dance',   'eyes',
    'tears',   'smile',   'hold',    'gone',    'miss',    'cry',     'away',    'free',
    'hurt',    'save',    'lost',    'find',    'leave',   'wait',    'tell',    'walk',
    'sing',    'live',    'die',     'wish',    'hope',    'far',     'world',   'road',
    'stars',   'sky',     'hands',   'face',    'name',    'days',    'pain',    'true',
    'real',    'good',    'hard',    'yeah',    'high',    'low',     'cold',    'break',
    'wrong',   'fly',     'fight',   'strong',  'long',    'loud',    'young',   'breath',
    'you',     'her',     'him',     'hey',     'get',     'let',     'out',     'your',
    'us',      'together','one',     'beautiful',
];

// Medium (40): words that appear in lyrics but take more thought to find
const WORDS_MEDIUM = [
    'broken',    'breathe',   'chase',     'scream',    'fade',      'shine',     'trust',     'shame',
    'ghost',     'hollow',    'empty',     'brave',     'wild',      'thunder',   'blood',     'shadow',
    'echo',      'wound',     'scar',      'battle',    'sacrifice', 'surrender', 'devotion',  'survive',
    'whisper',   'wander',    'rebel',     'collide',   'drown',     'haunt',     'ignite',    'crumble',
    'shatter',   'hunger',    'restless',  'reckless',  'bleed',     'crawl',     'burn',      'rise',
];

// Hard (20): uncommon words that still appear in some song lyrics
const WORDS_HARD = [
    'labyrinth',  'phantom',    'inferno',    'requiem',    'asylum',
    'elegy',      'tempest',    'silhouette', 'epitaph',    'vendetta',
    'enigma',     'absolution', 'melancholy', 'oblivion',   'purgatory',
    'covenant',   'paradox',    'catharsis',  'exile',      'abyss',
];

// ── CONFIG ────────────────────────────────────────────────────────────────────
const TIME_LIMIT    = 30;
const STREAK_MEDIUM = 5;
const STREAK_HARD   = 10;


const SCORE_CONFIG = {
    easy:   { base: 100, timeBonus: 2  },   // max 160 pts
    medium: { base: 250, timeBonus: 5  },   // max 400 pts
    hard:   { base: 500, timeBonus: 10 },   // max 800 pts
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let spotifyToken   = null;
let spotifyExpiry  = 0;
let currentWord    = '';
let roundActive    = false;
let roundStartedAt = null;
let pauseStart     = null;   // tracks when timer was paused (for no-lyrics retry)
let timerRAF       = null;
let searchDebounce = null;
let score          = 0;
let streak         = 0;
let usedWords      = new Set();

// ── DIFFICULTY ────────────────────────────────────────────────────────────────
function getDifficulty() {
    if (streak >= STREAK_HARD)   return 'hard';
    if (streak >= STREAK_MEDIUM) return 'medium';
    return 'easy';
}

function pickWord() {
    const diff = getDifficulty();
    const pool = diff === 'hard' ? WORDS_HARD : diff === 'medium' ? WORDS_MEDIUM : WORDS_EASY;
    let available = pool.filter(w => !usedWords.has(w));
    if (available.length === 0) { pool.forEach(w => usedWords.delete(w)); available = pool.slice(); }
    const word = available[Math.floor(Math.random() * available.length)];
    usedWords.add(word);
    return word;
}

function updateDiffBadge() {
    const diff  = getDifficulty();
    const badge = document.getElementById('diff-badge');
    badge.className = `diff-badge diff-${diff}`;
    badge.innerText = diff.toUpperCase();

    const wd = document.getElementById('word-display');
    wd.className = diff;   // easy / medium / hard — drives CSS gradient
}

// ── SPOTIFY ───────────────────────────────────────────────────────────────────
async function getSpotifyToken() {
    if (spotifyToken && Date.now() < spotifyExpiry) return spotifyToken;
    const res = await fetch('https://accounts.spotify.com/api/token', {
        method:  'POST',
        headers: {
            Authorization:  `Basic ${btoa(`${SPOTIFY_CLIENT_ID}:${SPOTIFY_CLIENT_SECRET}`)}`,
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'grant_type=client_credentials',
    });
    if (!res.ok) throw new Error(`Spotify token error: ${res.status}`);
    const data    = await res.json();
    spotifyToken  = data.access_token;
    spotifyExpiry = Date.now() + (data.expires_in - 60) * 1000;
    return spotifyToken;
}

async function searchSpotify(query) {
    const token = await getSpotifyToken();
    const res   = await fetch(
        `https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=8&market=US`,
        { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) throw new Error(`Spotify search error: ${res.status}`);
    return (await res.json()).tracks.items;
}

// ── LYRICS ────────────────────────────────────────────────────────────────────
async function fetchLyrics(trackName, artist) {
    const cleanTitle  = trackName.replace(/\s*[\(\[].*?[\)\]]/g, '').trim();
    const cleanArtist = artist.split(',')[0].trim();
    try {
        const url = `https://api.lyrics.ovh/v1/${encodeURIComponent(cleanArtist)}/${encodeURIComponent(cleanTitle)}`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        return data.lyrics || null;
    } catch (e) {
        console.error('lyrics.ovh failed:', e);
        return null;
    }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function wordInText(word, text) {
    const re = new RegExp(`\\b${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
    return re.test(text);
}

function show(id)     { document.getElementById(id).style.display = 'block'; }
function showFlex(id) { const el = document.getElementById(id); el.style.display = 'flex'; el.style.flexDirection = 'column'; el.style.gap = '10px'; }
function hide(id)     { document.getElementById(id).style.display = 'none'; }
function esc(s)       { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── GAME LIFECYCLE ────────────────────────────────────────────────────────────
function startGame() {
    score  = 0;
    streak = 0;
    usedWords.clear();
    document.getElementById('score-val').innerText  = '0';
    document.getElementById('streak-val').innerText = '0';
    document.getElementById('score-area').style.display = 'flex';
    updateDiffBadge();
    hide('game-over-box');
    startRound();
}

function startRound() {
    currentWord    = pickWord();
    roundActive    = true;
    roundStartedAt = Date.now();
    pauseStart     = null;

    hide('feedback');
    hide('start-btn');
    hide('checking-box');
    hide('game-over-box');
    show('word-container');
    show('timer-container');
    showFlex('search-container');

    const wd = document.getElementById('word-display');
    wd.innerText = currentWord.toUpperCase();
    wd.className = getDifficulty();

    document.getElementById('search-bar').value          = '';
    document.getElementById('songs-list').innerHTML      = '';
    document.getElementById('empty-state').innerText     = '🎵 Start typing to search songs…';
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('loader-area').style.display = 'none';

    const bar = document.getElementById('timer-bar');
    bar.style.cssText = 'width:100%;height:100%;border-radius:999px;background:linear-gradient(90deg,#1DB954,#17a349);';

    document.getElementById('search-bar').focus();
    runTimer();
}

function runTimer() {
    cancelAnimationFrame(timerRAF);
    const bar  = document.getElementById('timer-bar');
    const text = document.getElementById('timer-text');

    function tick() {
        if (!roundActive) return;
        const elapsed   = (Date.now() - roundStartedAt) / 1000;
        const remaining = Math.max(0, TIME_LIMIT - elapsed);
        bar.style.width = `${(remaining / TIME_LIMIT) * 100}%`;
        text.innerText  = `${Math.ceil(remaining)}s`;
        if (remaining <= 5) bar.style.background = 'linear-gradient(90deg,#ff4444,#cc0000)';
        if (remaining <= 0) { roundActive = false; endRound('timeout', null); return; }
        timerRAF = requestAnimationFrame(tick);
    }
    timerRAF = requestAnimationFrame(tick);
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearchInput(val) {
    clearTimeout(searchDebounce);
    const q = val.trim();
    if (!q) {
        document.getElementById('songs-list').innerHTML      = '';
        document.getElementById('empty-state').innerText     = '🎵 Start typing to search songs…';
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('loader-area').style.display = 'none';
        return;
    }
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('loader-area').style.display = 'block';
    document.getElementById('songs-list').innerHTML      = '';

    searchDebounce = setTimeout(async () => {
        try {
            const tracks = await searchSpotify(q);
            document.getElementById('loader-area').style.display = 'none';
            renderResults(tracks);
        } catch {
            document.getElementById('loader-area').style.display = 'none';
            document.getElementById('empty-state').innerText     = '⚠️ Spotify search failed.';
            document.getElementById('empty-state').style.display = 'block';
        }
    }, 350);
}

function renderResults(tracks) {
    const list = document.getElementById('songs-list');
    list.innerHTML = '';
    if (!tracks.length) {
        document.getElementById('empty-state').innerText     = 'No results found.';
        document.getElementById('empty-state').style.display = 'block';
        return;
    }
    tracks.forEach(track => {
        const art     = track.album.images[2]?.url || track.album.images[0]?.url || '';
        const artists = track.artists.map(a => a.name).join(', ');
        const li      = document.createElement('li');
        li.className  = 'song-item';
        li.innerHTML  = `
            ${art ? `<img src="${art}" alt="">` : `<div class="song-placeholder">🎵</div>`}
            <div style="min-width:0;flex:1;">
                <div class="song-title">${esc(track.name)}</div>
                <div class="song-artist">${esc(artists)}</div>
            </div>`;
        li.onclick = () => pickSong(track);
        list.appendChild(li);
    });
}

// ── PICK SONG ─────────────────────────────────────────────────────────────────
async function pickSong(track) {
    if (!roundActive) return;

    // Pause the timer while we check
    cancelAnimationFrame(timerRAF);
    timerRAF   = null;
    roundActive = false;
    pauseStart  = Date.now();

    hide('search-container');
    hide('timer-container');
    hide('word-container');

    const art = track.album.images[1]?.url || track.album.images[0]?.url || '';
    document.getElementById('ck-art').src         = art;
    document.getElementById('ck-title').innerText  = track.name;
    document.getElementById('ck-status').innerHTML = 'Checking lyrics<span>.</span><span>.</span><span>.</span>';
    document.getElementById('checking-box').style.display = 'flex';

    // Rule 1: word must NOT appear in the title
    if (wordInText(currentWord, track.name)) {
        hide('checking-box');
        endRound('word-in-title', track);
        return;
    }

    const trackName = track.name;
    const artist    = track.artists.map(a => a.name).join(', ');

    try {
        const lyrics = await fetchLyrics(trackName, artist);
        hide('checking-box');

        if (lyrics === null) {
            // No lyrics found — let player retry, resume timer where it left off
            endRound('no-lyrics', track);
            return;
        }

        // Compute remaining time (exclude time spent on the API call)
        const pausedDuration = Date.now() - pauseStart;
        roundStartedAt += pausedDuration;   // shift start so elapsed doesn't count paused time
        const elapsedSec   = (Date.now() - roundStartedAt) / 1000;
        const remainingSec = Math.max(0, TIME_LIMIT - elapsedSec);

        if (wordInText(currentWord, lyrics)) {
            // WIN
            const diff   = getDifficulty();
            const cfg    = SCORE_CONFIG[diff];
            const points = cfg.base + Math.floor(remainingSec * cfg.timeBonus);
            score  += points;
            streak += 1;
            document.getElementById('score-val').innerText  = score;
            document.getElementById('streak-val').innerText = streak;
            updateDiffBadge();
            endRound('win', track, points);
        } else {
            endRound('wrong', track);
        }

    } catch (e) {
        console.error(e);
        hide('checking-box');
        endRound('error', track);
    }
}

// ── END ROUND ─────────────────────────────────────────────────────────────────
function endRound(result, track, pointsEarned) {
    hide('search-container');
    hide('timer-container');
    hide('word-container');
    hide('checking-box');

    const fb   = document.getElementById('feedback');
    const name = track ? `&ldquo;${esc(track.name)}&rdquo;` : '';

    if (result === 'win') {
        fb.innerHTML = `<div class="feedback-box fb-win">
            ✅ ${name} has <strong>${currentWord}</strong> in its lyrics!
            <div style="font-size:0.78rem;font-weight:400;opacity:0.7;margin-top:4px;">+${pointsEarned} pts</div>
        </div>`;
        fb.style.display = 'block';

        const btn     = document.getElementById('start-btn');
        btn.innerHTML = '&#9654; Next Round';
        btn.onclick   = startRound;
        btn.style.display = 'block';

    } else if (result === 'no-lyrics' || result === 'error') {
        const msg = result === 'no-lyrics'
            ? `⚠️ Couldn&rsquo;t find lyrics for ${name}. Pick another song!`
            : `⚠️ Lyrics lookup failed. Pick another song!`;
        fb.innerHTML = `<div class="feedback-box fb-warn">${msg}</div>`;
        fb.style.display = 'block';

        // Resume round with timer continuing from where it was
        setTimeout(() => {
            hide('feedback');
            // Adjust roundStartedAt to account for the display delay
            roundStartedAt += 1800;
            show('word-container');
            show('timer-container');
            showFlex('search-container');
            roundActive = true;
            runTimer();
            document.getElementById('search-bar').focus();
        }, 1800);

    } else {
        // GAME OVER: wrong, word-in-title, or timeout
        let reasonHtml = '';
        if (result === 'word-in-title') {
            reasonHtml = `<div class="feedback-box fb-lose" style="margin-bottom:16px;">
                ❌ <strong>${esc(track.name)}</strong> has <strong>${currentWord}</strong> in its title!<br>
                <span style="font-size:0.8rem;font-weight:400;">The word must be in the lyrics only.</span>
            </div>`;
        } else if (result === 'wrong') {
            reasonHtml = `<div class="feedback-box fb-lose" style="margin-bottom:16px;">
                ❌ ${name} doesn&rsquo;t have <strong>${currentWord}</strong> in its lyrics.
            </div>`;
        } else if (result === 'timeout') {
            reasonHtml = `<div class="feedback-box fb-lose" style="margin-bottom:16px;">
                ⏰ Time&rsquo;s up! The word was <strong>${currentWord}</strong>.
            </div>`;
        }

        fb.innerHTML     = reasonHtml;
        fb.style.display = 'block';

        showGameOver();
    }
}

function showGameOver() {
    const diff       = getDifficulty();
    const diffLabel  = diff.toUpperCase();

    const box = document.getElementById('game-over-box');
    box.innerHTML = `
        <div class="go-title">GAME OVER</div>
        <div class="go-score" style="margin:10px 0 4px;">${score} <span style="font-size:1.2rem;color:#555;">pts</span></div>
        <div style="display:flex;justify-content:center;gap:24px;font-size:0.82rem;color:#555;margin-bottom:20px;">
            <span>Streak &nbsp;<strong style="color:#ccc;">${streak}</strong></span>
            <span>Level reached &nbsp;<span class="diff-badge diff-${diff}">${diffLabel}</span></span>
        </div>
    `;
    box.style.display = 'block';

    const btn     = document.getElementById('start-btn');
    btn.innerHTML = '&#9654; Play Again';
    btn.onclick   = startGame;
    btn.style.display = 'block';
}
</script>
